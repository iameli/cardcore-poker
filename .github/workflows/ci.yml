name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # pnpm version comes from package.json's packageManager field.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Prettier
        run: pnpm format:check
      - name: cargo fmt
        run: cargo fmt --all -- --check

  docker:
    name: Docker (full test suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The test image is ~10.5GB and exists TWICE during the build step (the
      # buildx store plus the `load:`ed docker copy), and the test run grows
      # the container by several more GB compiling the release test binaries.
      # That blows straight past the ~21GB free on a stock runner — every disk
      # byte matters here.
      - name: Free runner disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cardcore-poker-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Drop the builder's copy of the image (it's been loaded into docker) so
      # the test run's overlay growth has room. The gha cache is already
      # exported — pruning the local store doesn't touch it.
      - name: Reclaim builder disk
        run: |
          docker buildx prune -af
          df -h /

      - name: Run full test suite
        run: docker run --rm cardcore-poker-test:ci

  build-wasm:
    name: WASM artifact
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@wasm-pack
      - run: wasm-pack build --target web --release
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/
